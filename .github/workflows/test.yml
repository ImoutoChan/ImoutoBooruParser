name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '13 3 * * 6'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Imouto.BooruParser.slnx

      - name: Build
        run: dotnet build Imouto.BooruParser.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Imouto.BooruParser.slnx --configuration Release --no-build --filter "FullyQualifiedName!~FavoritePostAsyncMethod" --logger trx --results-directory TestResults

      - name: Test report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: Tests
          path: TestResults/*.trx
          reporter: dotnet-trx
